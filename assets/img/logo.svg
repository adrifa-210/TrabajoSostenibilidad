<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo circular suave (opcional para Favicon) -->
  <circle cx="50" cy="50" r="48" fill="white" fill-opacity="0.05" />
  
  <!-- Parte Izquierda: Tecnología (Azul) -->
  <path d="M50 20C35 20 25 35 25 55C25 75 35 85 50 85V20Z" fill="#2161a1" />
  <!-- Líneas de circuito en la parte azul -->
  <path d="M35 40H45M30 55H45M35 70H45" stroke="white" stroke-width="3" stroke-linecap="round" />
  <circle cx="33" cy="40" r="3" fill="white" />
  <circle cx="28" cy="55" r="3" fill="white" />
  <circle cx="33" cy="70" r="3" fill="white" />
  
  <!-- Parte Derecha: Ecología (Verde) -->
  <path d="M50 20C65 20 75 35 75 55C75 75 65 85 50 85V20Z" fill="#2db360" />
  <!-- Nervio de la hoja en la parte verde -->
  <path d="M50 35L65 45M50 55L70 65M50 75L60 82" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6" />
  
  <!-- Tallo central -->
  <rect x="48" y="85" width="4" height="10" rx="2" fill="#4B5563" />
</svg>
